AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon Connect + Deepgram Integration - Secrets Manager and KMS Setup'

Parameters:
  DeepgramApiToken:
    Type: String
    NoEcho: true
    Description: Your Deepgram API token (will be stored in Secrets Manager)

  ConnectInstanceArn:
    Type: String
    Description: ARN of your Amazon Connect instance
    AllowedPattern: arn:aws:connect:[a-z0-9-]+:[0-9]+:instance/[a-z0-9-]+

  KmsKeyArn:
    Type: String
    Description: ARN of existing customer-managed KMS key (or leave blank to create new)
    Default: ''

Conditions:
  CreateKmsKey: !Equals [!Ref KmsKeyArn, '']

Resources:
  # KMS Key (if not provided)
  DeepgramKmsKey:
    Type: AWS::KMS::Key
    Condition: CreateKmsKey
    Properties:
      Description: KMS key for Deepgram secret encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'
          - Sid: AllowConnectDecrypt
            Effect: Allow
            Principal:
              Service: connect.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
            Resource: '*'
            Condition:
              ArnLike:
                aws:SourceArn: !Ref ConnectInstanceArn

  DeepgramKmsKeyAlias:
    Type: AWS::KMS::Alias
    Condition: CreateKmsKey
    Properties:
      AliasName: alias/deepgram-connect-key
      TargetKeyId: !Ref DeepgramKmsKey

  # Secrets Manager Secret
  DeepgramSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: deepgram
      Description: Deepgram API credentials for Amazon Connect TTS/STT
      KmsKeyId: !If [CreateKmsKey, !Ref DeepgramKmsKey, !Ref KmsKeyArn]
      SecretString: !Sub '{"apiToken":"${DeepgramApiToken}"}'

  # Secret Resource Policy
  DeepgramSecretResourcePolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref DeepgramSecret
      ResourcePolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: connect.amazonaws.com
            Action: secretsmanager:GetSecretValue
            Resource: '*'
            Condition:
              ArnLike:
                aws:SourceArn: !Ref ConnectInstanceArn

Outputs:
  SecretArn:
    Description: ARN of the Deepgram secret (use this in your Connect contact flow)
    Value: !Ref DeepgramSecret
    Export:
      Name: !Sub ${AWS::StackName}-SecretArn

  KmsKeyArn:
    Description: ARN of the KMS key
    Value: !If [CreateKmsKey, !GetAtt DeepgramKmsKey.Arn, !Ref KmsKeyArn]
    Export:
      Name: !Sub ${AWS::StackName}-KmsKeyArn

  KmsKeyId:
    Condition: CreateKmsKey
    Description: ID of the created KMS key
    Value: !Ref DeepgramKmsKey
